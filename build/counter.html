<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Divya Jaap - Ultimate Tally Counter</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- Reset & Variables --- */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-dark: #050b14;
            --bg-light: #0d1f3d;
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.5);
            --blue-glow: rgba(74, 159, 224, 0.4);
            --text-main: #EEF4FF;
            --danger: #ff4757;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scroll bounce on mobile */
            user-select: none;
        }

        /* --- Background Animation --- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
        }

        /* --- Main UI Container --- */
        .app-container {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- Header & Mala Counter --- */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.2rem;
            color: var(--gold);
            text-shadow: 0 0 15px var(--gold-glow);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .mala-tracker {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .mala-tracker span {
            color: var(--gold);
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* --- The 3D Tap Sphere & Progress Ring --- */
        .counter-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 3rem;
            animation: zoomIn 1s ease cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Circular SVG Progress */
        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
            z-index: 1;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            stroke-linecap: round;
        }

        /* The Interactive Sphere */
        .tap-sphere {
            position: relative;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1e4b8f, #07132a 70%);
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.8), 
                inset 0 -15px 25px rgba(0,0,0,0.8), 
                inset 0 15px 25px rgba(255,255,255,0.2),
                0 0 30px var(--blue-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            overflow: hidden;
            transition: transform 0.1s;
        }

        /* Breathing Animation */
        .tap-sphere::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            opacity: 0.3;
            animation: pulseGlow 3s infinite alternate;
            pointer-events: none;
        }

        .tap-sphere:active {
            transform: scale(0.94);
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.8), 
                inset 0 -5px 15px rgba(0,0,0,0.8), 
                inset 0 5px 15px rgba(255,255,255,0.1),
                0 0 15px var(--gold-glow);
            border-color: var(--gold);
        }

        #count-display {
            font-size: 5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 5px 20px rgba(255, 215, 0, 0.6);
            z-index: 3;
            pointer-events: none;
        }

        /* Ripple Effect on Tap */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.6);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }

        /* --- Controls (-1, Reset) --- */
        .controls {
            display: flex;
            gap: 2rem;
            animation: fadeInUp 1s ease;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-reset {
            color: var(--danger);
            border-color: rgba(255, 71, 87, 0.3);
        }
        .btn-reset:hover {
            background: rgba(255, 71, 87, 0.1);
            border-color: var(--danger);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }

        /* --- Milestone Celebration Modal --- */
        #milestone-popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #milestone-popup.show {
            opacity: 1;
            pointer-events: all;
        }

        .milestone-text {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 3rem;
            color: var(--gold);
            text-shadow: 0 0 30px var(--gold);
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #milestone-popup.show .milestone-text {
            transform: scale(1);
        }

        /* --- Animations Keyframes --- */
        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.1); opacity: 0.5; }
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

    </style>
</head>
<body>

    <!-- Background Canvas for Divine Particles -->
    <canvas id="particle-canvas"></canvas>

    <!-- Milestone Celebration Overlay -->
    <div id="milestone-popup">
        <h2 class="milestone-text">1 Mala Complete!</h2>
        <p style="color: white; margin-top: 10px; opacity: 0.8;">Tap anywhere to continue</p>
    </div>

    <!-- Main UI -->
    <div class="app-container">
        
        <header class="header">
            <h1 class="title">श्री राधा</h1>
            <div class="mala-tracker">
                Mala: <span id="mala-display">0</span>
            </div>
        </header>

        <!-- Counter Area -->
        <div class="counter-wrapper">
            <!-- Circular Progress SVG -->
            <svg class="progress-ring" width="280" height="280">
                <circle cx="140" cy="140" r="130" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="8"></circle>
                <circle class="progress-ring__circle" id="progress-circle" cx="140" cy="140" r="130" fill="transparent" stroke="url(#gradient)" stroke-width="8" stroke-dasharray="816.8" stroke-dashoffset="816.8"></circle>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#FFD700" />
                        <stop offset="100%" stop-color="#FF8C00" />
                    </linearGradient>
                </defs>
            </svg>

            <!-- 3D Tap Sphere -->
            <div class="tap-sphere" id="tap-zone">
                <span id="count-display">0</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn" id="btn-minus">- 1 Undo</button>
            <button class="btn btn-reset" id="btn-reset">Reset</button>
        </div>

    </div>

    <script>
        // ==========================================
        // DIVINE PARTICLES BACKGROUND (HTML5 CANVAS)
        // ==========================================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initParticles() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 1,
                    dx: (Math.random() - 0.5) * 0.5,
                    dy: (Math.random() - 0.5) * 0.5,
                    alpha: Math.random() * 0.5 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;
                
                // Wrap around edges
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${p.alpha})`; // Gold particles
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#FFD700';
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        
        window.addEventListener('resize', initParticles);
        initParticles();
        drawParticles();

        // ==========================================
        // JAAP COUNTER LOGIC & STORAGE
        // ==========================================
        const TARGET = 108; // 1 Mala = 108 Beads
        let count = parseInt(localStorage.getItem('divyaJaapCount')) || 0;
        let malaCount = parseInt(localStorage.getItem('divyaMalaCount')) || 0;

        const countDisplay = document.getElementById('count-display');
        const malaDisplay = document.getElementById('mala-display');
        const tapZone = document.getElementById('tap-zone');
        const progressCircle = document.getElementById('progress-circle');
        const milestonePopup = document.getElementById('milestone-popup');

        // SVG Ring setup
        const radius = progressCircle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;

        function updateUI() {
            countDisplay.innerText = count;
            malaDisplay.innerText = malaCount;
            
            // Calculate progress for the circular ring (0 to 108)
            const progressPercent = (count % TARGET) / TARGET;
            const offset = circumference - (progressPercent * circumference);
            
            // If count is exactly 108 (or multiple), ring should be full
            if (count > 0 && count % TARGET === 0) {
                progressCircle.style.strokeDashoffset = 0;
            } else {
                progressCircle.style.strokeDashoffset = offset;
            }

            // Save data locally
            localStorage.setItem('divyaJaapCount', count);
            localStorage.setItem('divyaMalaCount', malaCount);
        }

        // Initialize UI on load
        updateUI();

        // TAP EVENT (Increment)
        tapZone.addEventListener('pointerdown', function(e) {
            // 1. Increment Count
            count++;
            
            // 2. Haptic Feedback (Vibration on mobile)
            if (navigator.vibrate) navigator.vibrate(30);

            // 3. Ripple Visual Effect
            createRipple(e, this);

            // 4. Check for Milestone (1 Mala Complete)
            if (count > 0 && count % TARGET === 0) {
                malaCount++;
                showMilestone();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Special vibration for milestone
            }

            updateUI();
        });

        // Decrement Button
        document.getElementById('btn-minus').addEventListener('click', () => {
            if (count > 0) {
                // If we undo a 108 multiple, remove a mala count
                if (count % TARGET === 0 && malaCount > 0) {
                    malaCount--;
                }
                count--;
                if (navigator.vibrate) navigator.vibrate(20);
                updateUI();
            }
        });

        // Reset Button
        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm("क्या आप सच में अपनी जाँप की गिनती शुरू से (Zero) करना चाहते हैं?")) {
                count = 0;
                malaCount = 0;
                updateUI();
            }
        });

        // ==========================================
        // EFFECTS HELPER FUNCTIONS
        // ==========================================
        function createRipple(event, element) {
            const circle = document.createElement('span');
            const diameter = Math.max(element.clientWidth, element.clientHeight);
            const radius = diameter / 2;

            const rect = element.getBoundingClientRect();
            
            // Calculate click position relative to the element
            let clientX = event.clientX;
            let clientY = event.clientY;
            
            // Fallback for touch
            if(clientX === undefined && event.touches && event.touches.length > 0){
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${clientX - rect.left - radius}px`;
            circle.style.top = `${clientY - rect.top - radius}px`;
            circle.classList.add('ripple');

            const existingRipple = element.querySelector('.ripple');
            if (existingRipple) existingRipple.remove();

            element.appendChild(circle);
            
            setTimeout(() => circle.remove(), 600);
        }

        function showMilestone() {
            milestonePopup.classList.add('show');
        }

        // Close milestone popup on click anywhere
        milestonePopup.addEventListener('click', () => {
            milestonePopup.classList.remove('show');
            // When closing popup after a mala, reset the visual ring gracefully
            progressCircle.style.transition = 'none'; // disable animation instantly
            progressCircle.style.strokeDashoffset = circumference; // reset to empty
            setTimeout(() => {
                progressCircle.style.transition = 'stroke-dashoffset 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            }, 50);
        });

    </script>
</body>
</html>
